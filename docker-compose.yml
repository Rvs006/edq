version: '3.8'

services:
  backend:
    build:
      context: ./server/backend
      dockerfile: Dockerfile
    container_name: edq-backend
    volumes:
      - edq-data:/app/data
      - edq-uploads:/app/uploads
      - edq-reports:/app/reports
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/edq.db
      - TOOLS_SIDECAR_URL=http://host.docker.internal:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edq-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  tools:
    build:
      context: ./tools
      dockerfile: Dockerfile
    container_name: edq-tools
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  edq-data:
  edq-uploads:
  edq-reports:
