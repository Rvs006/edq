# EDQ Docker Compose Configuration
# Electracom Device Qualifier — two-service architecture (backend+tools combined)
# Usage: docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: server/backend/Dockerfile
    container_name: edq-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - edq-data:/app/data
      - edq-uploads:/app/uploads
      - edq-reports:/app/reports
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/edq.db}
      - TOOLS_SIDECAR_URL=http://localhost:8001
      - TOOLS_API_KEY=${TOOLS_API_KEY}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Required for nmap raw socket scans (SYN scan, OS detection, etc.)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - edq-internal
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health >/dev/null && curl -sf http://localhost:8001/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edq-frontend
    ports:
      - "127.0.0.1:3000:80"
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://0.0.0.0/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # PostgreSQL — optional, recommended for production and concurrent workloads (20+ devices)
