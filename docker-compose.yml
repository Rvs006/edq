# EDQ Docker Compose Configuration
# Electracom Device Qualifier — two-service architecture (backend+tools combined)
# Usage: docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: server/backend/Dockerfile
    container_name: edq-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${EDQ_BACKEND_BIND_HOST:-127.0.0.1}:${EDQ_BACKEND_PORT:-8000}:8000"
      - "${EDQ_TOOLS_BIND_HOST:-127.0.0.1}:${EDQ_TOOLS_PORT:-8001}:8001"
    volumes:
      - edq-data:/app/data
      - edq-uploads:/app/uploads
      - edq-reports:/app/reports
    env_file:
      - .env
    environment:
      - ENVIRONMENT=docker
      - DATABASE_URL=${DOCKER_DATABASE_URL:-postgresql+asyncpg://${DB_USER:-edq}:${POSTGRES_PASSWORD}@postgres:5432/${DB_NAME:-edq}}
      - DB_HOST=postgres
      - DB_PORT=5432
      - TOOLS_SIDECAR_URL=${TOOLS_SIDECAR_URL:-http://localhost:8001}
      - TOOLS_API_KEY=${TOOLS_API_KEY}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Required for nmap raw socket scans (SYN scan, OS detection, etc.)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - edq-internal
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health >/dev/null && curl -sf http://localhost:8001/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    build:
      context: ./server/postgres
      dockerfile: Dockerfile
    container_name: edq-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-edq}
      POSTGRES_USER: ${DB_USER:-edq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${EDQ_POSTGRES_BIND_HOST:-127.0.0.1}:${EDQ_POSTGRES_PORT:-5432}:5432"
    volumes:
      - edq-pgdata:/var/lib/postgresql/data
    networks:
      - edq-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edq} -d ${DB_NAME:-edq}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_CLIENT_ERROR_ENDPOINT: ${VITE_CLIENT_ERROR_ENDPOINT:-/api/client-errors}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_ENABLED: ${VITE_SENTRY_ENABLED:-false}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.0}
        VITE_SOURCEMAP: ${VITE_SOURCEMAP:-false}
    container_name: edq-frontend
    ports:
      - "${EDQ_BIND_HOST:-127.0.0.1}:${EDQ_PUBLIC_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Redis — optional, enables distributed rate limiting and session persistence
  # Uncomment to enable for multi-instance deployments
  # redis:
  #   image: redis:7-alpine
  #   container_name: edq-redis
  #   command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-edq-redis-secret}
  #   volumes:
  #     - edq-redis:/data
  #   networks:
  #     - edq-internal
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-edq-redis-secret}", "ping"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 3

volumes:
  edq-data:
    driver: local
  edq-uploads:
    driver: local
  edq-reports:
    driver: local
  edq-pgdata:
    driver: local
  # edq-redis:
  #   driver: local

networks:
  # Backend needs outbound access to reach devices on the LAN for scanning
  edq-internal:
    driver: bridge
    internal: false
  # Frontend network: frontend <-> backend (for nginx proxy)
  edq-frontend:
    driver: bridge
