volumes:
  edq-data:
    driver: local
  edq-uploads:
    driver: local
  edq-reports:
    driver: local
  # edq-pgdata:
  #   driver: local
  # edq-redis:
  #   driver: local

networks:
  # Backend needs outbound access to reach devices on the LAN for scanning
  edq-internal:
    driver: bridge
    internal: false
  # Frontend network: frontend <-> backend (for nginx proxy)
  edq-frontend:
    driver: bridge
