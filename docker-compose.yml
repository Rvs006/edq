# EDQ Docker Compose Configuration
# Electracom Device Qualifier — three-service architecture
# Usage: docker compose up --build

services:
  backend:
    build:
      context: ./server/backend
      dockerfile: Dockerfile
    container_name: edq-backend
    ports:
      - "8000:8000"
    volumes:
      - edq-data:/app/data
      - edq-uploads:/app/uploads
      - edq-reports:/app/reports
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/edq.db
      - TOOLS_SIDECAR_URL=http://tools:8001
    depends_on:
      tools:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edq-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  tools:
    build:
      context: ./tools
      dockerfile: Dockerfile
    container_name: edq-tools
    ports:
      - "8001:8001"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  edq-data:
    driver: local
  edq-uploads:
    driver: local
  edq-reports:
    driver: local
