# EDQ Docker Compose Configuration
# Electracom Device Qualifier — three-service architecture
# Usage: docker compose up --build

services:
  backend:
    build:
      context: ./server/backend
      dockerfile: Dockerfile
    container_name: edq-backend
    # Bind to 127.0.0.1 so port 8000 is only accessible from the local host, not the network
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - edq-data:/app/data
      - edq-uploads:/app/uploads
      - edq-reports:/app/reports
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/edq.db
      - TOOLS_SIDECAR_URL=http://tools:8001
      - TOOLS_API_KEY=${TOOLS_API_KEY}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD in .env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tools:
        condition: service_healthy
    networks:
      - edq-internal
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edq-frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - edq-frontend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://0.0.0.0/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  tools:
    build:
      context: ./tools
      dockerfile: Dockerfile
    container_name: edq-tools
    # Bind to 127.0.0.1 so the tools sidecar is only accessible from the local host
    ports:
      - "127.0.0.1:8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TOOLS_API_KEY=${TOOLS_API_KEY}
    # Required for nmap raw socket scans (SYN scan, OS detection, etc.)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - edq-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Redis — optional, enables distributed rate limiting and session persistence
  # Uncomment to enable for multi-instance deployments
  # redis:
  #   image: redis:7-alpine
  #   container_name: edq-redis
  #   command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-edq-redis-secret}
  #   volumes:
  #     - edq-redis:/data
  #   networks:
  #     - edq-internal
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-edq-redis-secret}", "ping"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 3

volumes:
  edq-data:
    driver: local
  edq-uploads:
    driver: local
  edq-reports:
    driver: local
  # edq-redis:
  #   driver: local

networks:
  # Backend ↔ tools network. Not marked `internal: true` because the tools
  # sidecar needs outbound access to reach devices on the LAN for scanning.
  edq-internal:
    driver: bridge
    internal: false
  # Frontend network: frontend ↔ backend (for nginx proxy)
  edq-frontend:
    driver: bridge
