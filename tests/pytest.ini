[pytest]
asyncio_mode = auto
addopts = --import-mode=importlib
norecursedirs =
    .pytest_cache
    __pycache__
    pytest-cache-files-*
markers =
    critical: Critical path tests
    security: Security tests
    performance: Performance benchmarks
    api: API endpoint tests
    edge: Edge case tests
    websocket: WebSocket tests
timeout = 30
testpaths = tests
