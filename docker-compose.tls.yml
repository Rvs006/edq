# TLS override — use with: docker compose -f docker-compose.yml -f docker-compose.tls.yml up
services:
  caddy:
    image: caddy:2-alpine
    container_name: edq-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    networks:
      - edq-frontend
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy

  frontend:
    ports: !reset []

volumes:
  caddy-data:
  caddy-config:
