version: 2

# Routine version-update PRs are intentionally disabled to avoid unattended
# major runtime churn. Dependabot alerts and security updates remain enabled
# in the repository security settings.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
    open-pull-requests-limit: 0
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /electron
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
    open-pull-requests-limit: 0
    groups:
      electron-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /server/backend
    schedule:
      interval: weekly
      day: monday
      time: "06:45"
    open-pull-requests-limit: 0
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /tools
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 0
    groups:
      tools-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /server/backend
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /server/postgres
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "07:45"
    open-pull-requests-limit: 0

  - package-ecosystem: docker
    directory: /scanner-agent/tools/nikto
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 0
