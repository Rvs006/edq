name: Container Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  container-scan:
    runs-on: ubuntu-latest
    env:
      INITIAL_ADMIN_PASSWORD: ci-test-admin-password
      TOOLS_API_KEY: ci-test-tools-key-32-character-value
      POSTGRES_PASSWORD: ci-test-postgres-password
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build backend image
        run: docker compose build backend

      - name: Scan backend image for critical and high CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: edq-backend:latest
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          sarif_file: trivy-results.sarif
