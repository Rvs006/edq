name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  audit-report:
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - name: Generate audit report
        run: |
          python scripts/audit/run_audit.py --scope full --output-dir reports/audit/ci --format both --strict --strict-fail-on-severity high
      - name: Validate audit report
        run: |
          python scripts/audit/validate_report.py --report reports/audit/ci/audit-report.json --markdown reports/audit/ci/audit-report.md --schema reports/schemas/audit-report.schema.json
      - name: Append job summary
        if: always()
        run: |
          python scripts/audit/emit_job_summary.py --report reports/audit/ci/audit-report.json >> "$GITHUB_STEP_SUMMARY"
      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: audit-report
          path: |
            reports/audit/ci/audit-report.json
            reports/audit/ci/audit-report.md

  backend-verify:
    runs-on: ubuntu-latest
    needs: audit-report
    permissions: read-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: |
          cd server/backend
          pip install -r requirements.txt -r requirements-dev.txt
          pytest tests/test_auth.py tests/test_authorization.py tests/security/test_auth_security.py tests/security/test_rate_limiting.py tests/security/test_injection.py tests/test_health.py -v --tb=short

  frontend-verify:
    runs-on: ubuntu-latest
    needs: audit-report
    permissions: read-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm exec tsc -p tsconfig.json --noEmit
          pnpm exec vitest run src/test/LoginPage.test.tsx src/__tests__/AppRoutes.test.tsx src/__tests__/DeviceDetailPage.test.tsx

  docker-build:
    runs-on: ubuntu-latest
    needs: [audit-report, backend-verify, frontend-verify]
    permissions: read-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: docker compose build
        env:
          INITIAL_ADMIN_PASSWORD: ci-test-admin-password
          TOOLS_API_KEY: ci-test-tools-key
          POSTGRES_PASSWORD: ci-test-postgres-password
