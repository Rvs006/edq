name: Nightly Full Verification

on:
  schedule:
    - cron: "23 4 * * 1-5"
  workflow_dispatch:

permissions: read-all

env:
  JWT_SECRET: ci-jwt-secret-for-nightly
  JWT_REFRESH_SECRET: ci-refresh-secret-for-nightly
  SECRET_KEY: ci-secret-key-for-nightly
  TOOLS_API_KEY: ci-test-tools-key-32-character-value
  INITIAL_ADMIN_PASSWORD: ci-test-admin-password
  POSTGRES_PASSWORD: ci-test-postgres-password
  DB_NAME: edq
  DB_USER: edq
  DB_PASSWORD: ci-test-postgres-password
  COOKIE_SECURE: "false"
  EDQ_ADMIN_PASS: ci-test-admin-password

jobs:
  backend-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Write CI environment
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          path = Path(".env")
          values = {
              "JWT_SECRET": "ci-jwt-secret-for-nightly",
              "JWT_REFRESH_SECRET": "ci-refresh-secret-for-nightly",
              "SECRET_KEY": "ci-secret-key-for-nightly",
              "TOOLS_API_KEY": "ci-test-tools-key-32-character-value",
              "INITIAL_ADMIN_PASSWORD": "ci-test-admin-password",
              "POSTGRES_PASSWORD": "ci-test-postgres-password",
              "DB_PASSWORD": "ci-test-postgres-password",
              "COOKIE_SECURE": "false",
              "DEBUG": "false",
          }
          lines = []
          seen = set()
          for line in path.read_text().splitlines():
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0]
                  if key in values:
                      lines.append(f"{key}={values[key]}")
                      seen.add(key)
                      continue
              lines.append(line)
          for key, value in values.items():
              if key not in seen:
                  lines.append(f"{key}={value}")
          path.write_text("\n".join(lines) + "\n")
          PY
      - name: Run backend suite in backend image
        run: ./scripts/backend-test.sh

  frontend-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Run frontend typecheck and full test suite
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm exec tsc -p tsconfig.json --noEmit
          pnpm test

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - name: Write CI environment
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          path = Path(".env")
          values = {
              "JWT_SECRET": "ci-jwt-secret-for-nightly",
              "JWT_REFRESH_SECRET": "ci-refresh-secret-for-nightly",
              "SECRET_KEY": "ci-secret-key-for-nightly",
              "TOOLS_API_KEY": "ci-test-tools-key-32-character-value",
              "INITIAL_ADMIN_PASSWORD": "ci-test-admin-password",
              "POSTGRES_PASSWORD": "ci-test-postgres-password",
              "DB_PASSWORD": "ci-test-postgres-password",
              "COOKIE_SECURE": "false",
              "DEBUG": "false",
          }
          lines = []
          seen = set()
          for line in path.read_text().splitlines():
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0]
                  if key in values:
                      lines.append(f"{key}={values[key]}")
                      seen.add(key)
                      continue
              lines.append(line)
          for key, value in values.items():
              if key not in seen:
                  lines.append(f"{key}={value}")
          path.write_text("\n".join(lines) + "\n")
          PY
      - name: Install smoke-test Python dependency
        run: python -m pip install websockets==16.0
      - name: Start stack
        run: docker compose up --build -d
      - name: Run smoke and API regression
        run: |
          ./scripts/verify-app.sh
          ./scripts/e2e-test.sh
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Stop stack
        if: always()
        run: docker compose down -v
